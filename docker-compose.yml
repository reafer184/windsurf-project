services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: totp_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/prisma-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'

  api:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/totp_auth
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_32_chars_minimum}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_32_chars_min}
      PORT: 3000
      NODE_ENV: production
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: '*'
    depends_on:
      - db
    ports:
      - '127.0.0.1:3000:3000'

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client:/usr/share/nginx/html:ro
    ports:
      - '80:80'
    depends_on:
      - api

volumes:
  pgdata:
