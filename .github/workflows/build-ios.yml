name: Build iOS .ipa

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запустить вручную из GitHub UI

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      # 1. Код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pwa/package-lock.json

      # 3. Зависимости и синхронизация Capacitor
      - name: Install deps & sync Capacitor
        working-directory: pwa
        run: |
          npm ci
          npx cap sync ios

      # 4. Импорт сертификата (.p12) из GitHub Secrets
      - name: Import certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "temp_password" build.keychain
          rm /tmp/certificate.p12

      # 5. Установка provisioning profile
      - name: Install provisioning profile
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Получаем UUID профиля
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | \
            plutil -extract UUID raw - 2>/dev/null || \
            /usr/libexec/PlistBuddy -c 'Print :UUID' \
            /dev/stdin <<< $(security cms -D -i /tmp/profile.mobileprovision))
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          rm /tmp/profile.mobileprovision

      # 6. Сборка архива
      - name: Build archive
        working-directory: pwa/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="${{ secrets.IOS_IDENTITY }}" \
            archive

      # 7. Экспорт .ipa
      - name: Export .ipa
        run: |
          cat > /tmp/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${{ secrets.IOS_EXPORT_METHOD }}</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>ru.totp.authenticator</key>
                  <string>${{ secrets.IOS_PROFILE_NAME }}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist /tmp/exportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      # 8. Сохраняем .ipa как артефакт (скачать из GitHub UI)
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOTP-Authenticator-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
