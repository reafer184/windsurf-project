name: Build Android APK

on:
  push:
    branches: [ main, feat/gost-streebog-totp ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'feat/gost-streebog-totp'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        working-directory: pwa
        run: npm install

      - name: Sync Capacitor -> android
        working-directory: pwa
        run: npx cap sync android --inline

      - name: Make gradlew executable
        working-directory: pwa/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: pwa/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOTP-Authenticator-debug-${{ github.run_number }}
          path: pwa/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
